<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}CardVault{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <style>
    :root {
      --pico-spacing: 0.75rem;
      --pico-form-element-spacing-vertical: 0.375rem;
      --pico-form-element-spacing-horizontal: 0.75rem;
      --pico-font-size: 93.75%; /* 15px base */
    }
    body { background: #f4f6f9; }
    header.container {
      padding-block: 0.5rem;
      background: #1e3a5f;
      border-bottom: none;
      max-width: 100%;
      padding-inline: 2rem;
    }
    header nav h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }
    main.container { padding-top: 1.25rem; }
    #add-form details {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 0.5rem;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
    }
    #add-form details summary {
      font-weight: 600;
      color: #1e3a5f;
    }
    #collection-section {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
    }
    td, th { padding: 0.4rem 0.6rem; }
    thead tr { background: #f0f4f9; }
    th { color: #4a6080; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .estimated-value { font-weight: 600; color: #2a7a4b; }
    .no-cards { color: var(--pico-color-zinc-400); text-align: center; padding: 1.5rem; }
    .grid { gap: 0.5rem; }
    details[open] summary { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <header class="container">
    <nav>
      <ul><li><h1>&#127183; CardVault</h1></li></ul>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
