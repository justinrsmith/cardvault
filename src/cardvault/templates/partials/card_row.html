<tr id="card-{{ card.id }}">
  <td>{{ card.year }}</td>
  <td>{{ card.player_name }}</td>
  <td>{{ card.brand }}</td>
  <td>{{ card.set }}</td>
  <td>{{ card.variation or "—" }}</td>
  <td>{{ card.card_number or "—" }}</td>
  {% include "partials/price_history.html" %}
  <td style="white-space: nowrap;">
    <button
      class="outline"
      style="padding: 0.2rem 0.6rem; margin: 0 0.25rem 0 0; font-size: 0.8rem;"
      hx-get="/cards/{{ card.id }}/edit"
      hx-target="closest tr"
      hx-swap="outerHTML"
    >Edit</button>
    <button
      class="outline secondary"
      style="padding: 0.2rem 0.6rem; margin: 0; font-size: 0.8rem;"
      hx-delete="/cards/{{ card.id }}"
      hx-target="closest tr"
      hx-swap="outerHTML"
      hx-confirm="Remove {{ card.player_name }} ({{ card.year }} {{ card.brand }} {{ card.set }})?"
    >Delete</button>
  </td>
</tr>
