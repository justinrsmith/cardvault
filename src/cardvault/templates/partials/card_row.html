<tr id="card-{{ card.id }}">
  <td>{{ card.player_name }}</td>
  <td>{{ card.year }}</td>
  <td>{{ card.brand }}</td>
  <td>{{ card.set }}</td>
  <td>{{ card.card_number }}</td>
  <td>{{ card.variation or "—" }}</td>
  <td>
    {% if card.estimated_value is not none %}
      <span class="estimated-value">${{ "%.2f"|format(card.estimated_value) }}</span>
    {% else %}
      <span style="color: var(--pico-color-zinc-400);">—</span>
    {% endif %}
  </td>
  <td>
    <button
      class="outline secondary"
      style="padding: 0.25rem 0.75rem; margin: 0;"
      hx-delete="/cards/{{ card.id }}"
      hx-target="closest tr"
      hx-swap="outerHTML"
      hx-confirm="Remove {{ card.player_name }} {{ card.year }} {{ card.brand }} #{{ card.card_number }}?"
    >Delete</button>
  </td>
</tr>
