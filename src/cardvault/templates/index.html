{% extends "base.html" %}

{% block content %}

<section id="add-form">
  <details>
    <summary>Add a card</summary>
    <form
      hx-post="/cards"
      hx-target="#card-body"
      hx-swap="afterbegin"
      hx-on:htmx:after-request="this.reset()"
    >
      <div class="grid">
        <label>
          Year
          <input type="number" name="year" placeholder="1989" min="1800" max="2100" required />
        </label>
        <label>
          Player name
          <input type="text" name="player_name" placeholder="Mickey Mantle" required />
        </label>
        <label>
          Brand
          <input type="text" name="brand" placeholder="Topps" required />
        </label>
        <label>
          Set
          <input type="text" name="set" placeholder="Base Set" required />
        </label>
      </div>
      <div class="grid">
        <label>
          Variation <small>(optional)</small>
          <input type="text" name="variation" placeholder="Rookie, PSA 9, etc." />
        </label>
        <label>
          Card # <small>(optional)</small>
          <input type="text" name="card_number" placeholder="311" />
        </label>
        <label>
          Notes <small>(optional)</small>
          <input type="text" name="notes" placeholder="Bought at show, etc." />
        </label>
      </div>
      <button type="submit">Add card</button>
    </form>
  </details>
</section>

<section id="collection-section">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem;">
    <h2 style="margin: 0; font-size: 1rem; font-weight: 600; color: #1e3a5f;">Collection</h2>
    <input
      type="search"
      placeholder="Search..."
      hx-get="/cards/search"
      hx-trigger="input changed delay:300ms, search"
      hx-target="#card-body"
      hx-swap="innerHTML"
      name="q"
      style="max-width: 220px; margin: 0;"
    />
  </div>

  <figure style="margin: 0;">
    <table>
      <thead>
        <tr>
          <th>Year</th>
          <th>Player</th>
          <th>Brand</th>
          <th>Set</th>
          <th>Variation</th>
          <th>Card #</th>
          <th>Est. Value</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="card-body">
        {% include "partials/card_list.html" %}
      </tbody>
    </table>
  </figure>
</section>

{% endblock %}
